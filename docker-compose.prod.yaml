name: blog-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: blog_postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog_network

  migrate:
    image: migrate/migrate
    restart: no
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=${BLOG_DB_URL}"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog_network

  app:
    image: ghcr.io/wreckitral/production-backend-go:latest
    container_name: blog_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - blog_network

  prometheus:
    image: prom/prometheus:latest
    container_name: blog_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - blog_network

  grafana:
    image: grafana/grafana:latest
    container_name: blog_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - blog_network

volumes:
  postgres_data:
    name: blog_prod_postgres_data
  prometheus_data:
    name: blog_prod_prometheus_data
  grafana_data:
    name: blog_prod_grafana_data

networks:
  blog_network:
    name: blog_prod_network
    driver: bridge
