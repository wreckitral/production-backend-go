services:
  postgres:
    image: postgres:17
    container_name: postgres_container
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - blog_network

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=${BLOG_DB_URL}"
      - "up"
    networks:
      - blog_network

  app:
    build: .
    container_name: blog_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BLOG_HTTP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_started
    networks:
      - blog_network

volumes:
  postgres_data:
    name: postgres_persistent_data

networks:
  blog_network:
    name: blog_network
    driver: bridge
