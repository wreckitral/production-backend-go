name: blog-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: blog_postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog_network

  migrate:
    image: migrate/migrate
    restart: no
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=${BLOG_DB_URL}"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog_network

  app:
    image: ghcr.io/wreckitral/production-backend-go:latest
    container_name: blog_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - blog_network

volumes:
  postgres_data:
    name: blog_prod_postgres_data

networks:
  blog_network:
    name: blog_prod_network
    driver: bridge
